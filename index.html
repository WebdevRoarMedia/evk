<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evensky &amp; Katz — Navigation Bar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#f4f1ea;font-family:'Hanken Grotesk',system-ui,sans-serif;color:#1b2a41}

  /* ── Utility strip ── */
  .utility-strip{background:#1b2a41;color:rgba(255,255,255,.78);font-size:12px;letter-spacing:.02em}
  .utility-strip-inner{max-width:1380px;margin:0 auto;height:38px;padding:0 32px;display:flex;align-items:center;justify-content:space-between}
  .utility-actions{display:flex;align-items:center;gap:10px}
  .utility-sep{width:1px;height:16px;background:rgba(255,255,255,.2)}
  .login-link-top{text-decoration:none;font-size:12px;font-weight:600;color:rgba(255,255,255,.7);white-space:nowrap;transition:color .12s}
  .login-link-top:hover{color:#fff}
  .cta-btn-top{text-decoration:none;font-size:11px;font-weight:600;color:#1b2a41;background:rgba(255,255,255,.85);padding:5px 12px;border-radius:5px;white-space:nowrap;transition:background .12s}
  .cta-btn-top:hover{background:#fff}

  /* ── Nav bar ── */
  .navbar{position:sticky;top:0;z-index:50;background:#fffdf9;border-bottom:1px solid rgba(27,42,65,.12);box-shadow:0 1px 0 rgba(27,42,65,.02)}
  .navbar-inner{position:relative;max-width:1380px;margin:0 auto}
  .navbar-row{height:84px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;gap:4px}

  /* logo */
  .logo{display:flex;align-items:center;gap:11px;text-decoration:none;flex:none}
  .logo-mark{width:42px;height:42px;border-radius:10px;background:#1b2a41;display:flex;align-items:center;justify-content:center;font-family:'Newsreader',serif;font-size:20px;color:#c79a52;letter-spacing:-.02em}
  .logo-text{display:flex;flex-direction:column;line-height:1}
  .logo-name{font-family:'Newsreader',serif;font-size:18px;font-weight:500;color:#1b2a41;letter-spacing:-.01em;white-space:nowrap}
  .logo-sub{font-size:8px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:rgba(27,42,65,.5);margin-top:5px;white-space:nowrap}

  /* nav links */
  .primary-nav{display:flex;align-items:center;gap:0;margin-left:auto}
  .nav-btn,.nav-link{display:inline-flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;font-size:14.5px;font-weight:600;color:#1b2a41;padding:8px 9px;border-radius:8px;white-space:nowrap;text-decoration:none;transition:background .15s}
  .nav-btn:hover,.nav-link:hover{background:rgba(27,42,65,.05)}
  .nav-btn .arrow{font-size:8px;color:#c79a52}
  .nav-sep{width:1px;height:22px;background:rgba(27,42,65,.14);margin:0 7px}
  .corp-btn{font-weight:700;color:#a8772f}
  .corp-btn:hover{background:rgba(199,154,82,.1)}
  .corp-btn .arrow{color:#a8772f}

  /* social in utility strip */
  .social-link{display:flex;color:rgba(255,255,255,.5);text-decoration:none;transition:color .15s}
  .social-link:hover{color:#fff}

  /* ── Dropdown panels ── */
  .dropdown{position:absolute;top:100%;background:#fffdf9;border:1px solid rgba(27,42,65,.12);border-radius:14px;box-shadow:0 24px 50px -18px rgba(27,42,65,.28);padding:22px;opacity:0;visibility:hidden;transform:translateY(6px);transition:opacity .18s,transform .18s,visibility .18s}
  .dropdown.open{opacity:1;visibility:visible;transform:translateY(0)}
  .dropdown-label{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#c79a52;padding:0 10px 12px}
  .dropdown-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px}
  .dropdown-item{display:flex;align-items:center;gap:11px;padding:11px 10px;border-radius:9px;text-decoration:none;transition:background .15s}
  .dropdown-item:hover{background:rgba(27,42,65,.05)}
  .dropdown-dot{width:7px;height:7px;border-radius:50%;background:#c79a52;flex:none}
  .dropdown-item-text{font-size:14.5px;font-weight:600;color:#1b2a41}
  .dropdown-footer{border-top:1px solid rgba(27,42,65,.1);margin-top:12px;padding-top:12px}
  .dropdown-footer a{display:inline-flex;align-items:center;gap:7px;text-decoration:none;font-size:14px;font-weight:700;color:#c79a52;padding:0 10px}

  /* services dropdown */
  .dropdown-services{left:32px;width:540px}
  /* about dropdown */
  .dropdown-about{left:130px;width:248px;padding:14px}
  /* corp dropdown */
  .dropdown-corp{right:32px;width:320px;background:#1b2a41;border-color:transparent;box-shadow:0 24px 50px -18px rgba(27,42,65,.4);padding:20px}
  .dropdown-corp .dropdown-item:hover{background:rgba(255,255,255,.07)}
  .dropdown-corp .dropdown-item-text{color:#fffdf9}
  .dropdown-corp .dropdown-label{padding-bottom:4px}
  .dropdown-corp .dropdown-sublabel{font-size:12.5px;color:rgba(255,255,255,.55);padding:0 10px 12px}
  .dropdown-corp .dropdown-footer{border-color:rgba(255,255,255,.14);margin-top:10px}

  /* ── Page skeletons section ── */
  .page-skeletons{max-width:1380px;margin:0 auto;padding:60px 32px 88px}
  .section-tag{font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#c79a52}
  .section-title{font-family:'Newsreader',serif;font-weight:400;font-size:clamp(34px,4.4vw,56px);line-height:1.04;letter-spacing:-.02em;color:#1b2a41;margin:14px 0 0}
  .section-desc{font-size:15px;line-height:1.6;color:rgba(27,42,65,.6);max-width:60ch;margin:18px 0 0}

  .legend{display:flex;flex-wrap:wrap;gap:22px;margin:26px 0 30px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(27,42,65,.55)}
  .legend-item{display:inline-flex;align-items:center;gap:7px}
  .legend-dot-hub{width:9px;height:9px;border-radius:50%;background:#1b2a41}
  .legend-dot-template{width:9px;height:9px;border-radius:50%;border:1px dashed rgba(27,42,65,.5)}
  .legend-dot-b2b{width:9px;height:9px;border-radius:2px;background:#c79a52}

  .pages-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;align-items:start}
  .page-card{background:#fffdf9;border:1px solid rgba(27,42,65,.12);border-radius:14px;padding:22px 22px 14px;display:flex;flex-direction:column;box-shadow:0 1px 2px rgba(27,42,65,.04)}
  .page-card-header{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .page-num{font-size:12px;font-weight:700;letter-spacing:.04em;color:#c79a52;font-variant-numeric:tabular-nums}
  .page-tag{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(27,42,65,.55);padding:3px 9px;border:1px solid rgba(27,42,65,.18);border-radius:20px}
  .page-b2b{font-size:9px;font-weight:700;letter-spacing:.1em;background:#c79a52;color:#fffdf9;padding:3px 8px;border-radius:20px}
  .page-name{margin:11px 0 0;font-family:'Newsreader',serif;font-weight:500;font-size:23px;line-height:1.05;letter-spacing:-.01em;color:#1b2a41}
  .page-branch{margin-top:6px;font-size:12px;font-weight:600;color:rgba(27,42,65,.5)}
  .page-variants{margin-top:9px;font-family:'Newsreader',serif;font-style:italic;font-size:13px;line-height:1.5;color:rgba(27,42,65,.62)}
  .page-external{margin-top:13px;padding:14px;background:rgba(27,42,65,.03);border:1px dashed rgba(27,42,65,.24);border-radius:9px;font-size:12.5px;line-height:1.5;color:rgba(27,42,65,.6)}
  .page-sections{margin-top:15px}
  .page-section-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid rgba(27,42,65,.09)}
  .section-num{width:15px;flex:none;font-size:10px;font-weight:600;color:rgba(27,42,65,.32);font-variant-numeric:tabular-nums}
  .section-label{font-size:14px;line-height:1.25;font-weight:500;color:#1b2a41}

  @media(max-width:960px){
    .pages-grid{grid-template-columns:repeat(2,1fr)}
    .primary-nav{display:none}
  }
  @media(max-width:600px){
    .pages-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- Utility strip -->
<div class="utility-strip">
  <div class="utility-strip-inner">
    <span>Three offices — Coral Gables · Lubbock · Bellevue</span>
    <div class="utility-actions">
      <a href="#" aria-label="Instagram" class="social-link">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="5"></rect><circle cx="12" cy="12" r="4"></circle><circle cx="17" cy="7" r="1.1" fill="currentColor" stroke="none"></circle></svg>
      </a>
      <a href="#" aria-label="Facebook" class="social-link">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M13.5 21v-7.9h2.62l.39-3.05h-3V8.1c0-.88.25-1.48 1.51-1.48h1.61V3.9c-.28-.04-1.24-.12-2.36-.12-2.33 0-3.93 1.42-3.93 4.04v2.26H7.7v3.05h2.25V21h3.55z"></path></svg>
      </a>
      <span class="utility-sep"></span>
      <a href="#" class="login-link-top">Client Login</a>
      <a href="#" class="cta-btn-top">Connect With an Advisor</a>
    </div>
  </div>
</div>

<!-- ===================== NAV ===================== -->
<div class="navbar">
  <div class="navbar-inner" id="navbarInner">
    <div class="navbar-row">

      <!-- logo -->
      <a href="#" class="logo">
        <span class="logo-mark">EVK</span>
        <span class="logo-text">
          <span class="logo-name">Evensky &amp; Katz</span>
          <span class="logo-sub">Wealth Management</span>
        </span>
      </a>

      <!-- primary links — pushed right -->
      <nav class="primary-nav">
        <button class="nav-btn" data-dropdown="services">Services<span class="arrow">&#9660;</span></button>
        <button class="nav-btn" data-dropdown="about">About<span class="arrow">&#9660;</span></button>
        <a href="#" class="nav-link" data-close-dropdown>Team</a>
        <a href="#" class="nav-link" data-close-dropdown>Insights</a>
        <a href="#" class="nav-link" data-close-dropdown>Events</a>
        <span class="nav-sep"></span>
        <button class="nav-btn corp-btn" data-dropdown="corp">Corporate Advantage<span class="arrow">&#9660;</span></button>
      </nav>
    </div>

    <!-- ===== Dropdown: Services ===== -->
    <div class="dropdown dropdown-services" id="dropdown-services">
      <div class="dropdown-label">Wealth Services</div>
      <div class="dropdown-grid" id="servicesGrid"></div>
      <div class="dropdown-footer">
        <a href="#">View all services <span>→</span></a>
      </div>
    </div>

    <!-- ===== Dropdown: About ===== -->
    <div class="dropdown dropdown-about" id="dropdown-about"></div>

    <!-- ===== Dropdown: Corporate Advantage ===== -->
    <div class="dropdown dropdown-corp" id="dropdown-corp">
      <div class="dropdown-label">For Employers — B2B</div>
      <div class="dropdown-sublabel">A separate audience &amp; offering</div>
      <div id="corpGrid"></div>
      <div class="dropdown-footer">
        <a href="#">Schedule a consultation <span>→</span></a>
      </div>
    </div>
  </div>
</div>


<script>
(function () {
  const services = ['Investment Management', 'Retirement Planning', 'Education Funding', 'Business Transition Planning', 'Philanthropy & Giving'];
  const about = ['Our Story', 'Our Values', 'Community Impact'];
  const corp = ['Overview', 'Helping Business Owners', 'Helping Your People', 'Participant Resources'];

  function buildItem(text) {
    return '<a href="#" class="dropdown-item"><span class="dropdown-dot"></span><span class="dropdown-item-text">' + text + '</span></a>';
  }

  document.getElementById('servicesGrid').innerHTML = services.map(buildItem).join('');
  document.getElementById('dropdown-about').innerHTML = about.map(buildItem).join('');
  document.getElementById('corpGrid').innerHTML = corp.map(buildItem).join('');

  // Dropdown logic
  let openId = null;
  const dropdowns = document.querySelectorAll('.dropdown');

  function closeAll() {
    openId = null;
    dropdowns.forEach(d => d.classList.remove('open'));
  }

  function openDropdown(id) {
    if (openId === id) return;
    closeAll();
    openId = id;
    const el = document.getElementById('dropdown-' + id);
    if (el) el.classList.add('open');
  }

  document.querySelectorAll('[data-dropdown]').forEach(btn => {
    btn.addEventListener('mouseenter', () => openDropdown(btn.dataset.dropdown));
  });
  document.querySelectorAll('[data-close-dropdown]').forEach(el => {
    el.addEventListener('mouseenter', closeAll);
  });
  document.getElementById('navbarInner').addEventListener('mouseleave', closeAll);
})();
</script>
<a href="index-hub.html" class="back-btn">← Hub</a>
<style>.back-btn{position:fixed;bottom:20px;left:20px;z-index:999;text-decoration:none;font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:13px;font-weight:600;color:#fff;background:#1b2a41;padding:8px 16px;border-radius:8px;box-shadow:0 2px 8px rgba(27,42,65,.25);transition:background .15s}.back-btn:hover{background:#c79a52}</style>
</body>
</html>
